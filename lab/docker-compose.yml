version: '3.8'

services:
  # The "Victim" - SharePoint Mock
  sharepoint-target:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sp_vulnerable_lab
    hostname: sharepoint-target
    networks:
      lab_net:
        ipv4_address: 10.10.10.5
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: "no"
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0

  # The "Attacker" - Your Python Script
  attacker-terminal:
    build:
      context: .
      dockerfile: attacker.Dockerfile
    container_name: sp_attacker
    hostname: attacker-terminal
    volumes:
      - .:/lab
    working_dir: /lab
    depends_on:
      - sharepoint-target
    networks:
      lab_net:
        ipv4_address: 10.10.10.10
    user: "${UID:-1000}:${GID:-1000}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    init: true
    tty: true
    stdin_open: true
    restart: "no"
    entrypoint: ["tail", "-f", "/dev/null"]

networks:
  lab_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.10.0/24
