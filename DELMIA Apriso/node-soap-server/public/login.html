<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Modern Authentication Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 font-sans">
    
    <div class="absolute w-[500px] h-[500px] bg-blue-500 opacity-20 rounded-full blur-[100px] -top-20 -left-20"></div>
    <div class="absolute w-[400px] h-[400px] bg-purple-600 opacity-20 rounded-full blur-[100px] bottom-10 right-10"></div>

    <div class="w-full max-w-[420px] bg-slate-800/80 backdrop-blur-xl shadow-2xl rounded-3xl p-10 z-10 fade-in border border-slate-700">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Portal Access</h1>
            <p class="text-slate-400 mt-2 text-sm">Please sign in with your FlexNet credentials</p>
        </div>

        <div id="alert-box"></div>

        <form id="login-form" method="POST" action="/login" class="space-y-5">
            <div>
                <label for="loginName" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider">Login Name</label>
                <input type="text" id="loginName" name="loginName" required class="w-full px-4 py-3 bg-slate-900/50 rounded-xl border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-white text-sm">
            </div>
            <div>
                <label for="password" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wider">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 bg-slate-900/50 rounded-xl border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-white text-sm">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg mt-4">Sign In</button>
        </form>
        
        <div id="success-box" class="hidden text-center">
            <div class="bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 px-6 py-8 rounded-2xl">
                <h2 id="welcome-msg" class="text-xl font-bold text-white mb-2"></h2>
                <p class="text-emerald-500 text-sm">인증이 성공적으로 완료되었습니다.</p>
                <button onclick="location.href='/login.html'" class="mt-6 bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded-xl w-full">Return to Login</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('error')) {
            document.getElementById('alert-box').innerHTML = `
                <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm flex items-center">
                    아이디 또는 비밀번호가 일치하지 않습니다.
                </div>`;
        } else if(urlParams.get('success') === 'true') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('success-box').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "환영합니다, " + urlParams.get('name') + "님!";
        }
    </script>
</body>
</html>
