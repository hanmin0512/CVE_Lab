<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Modern Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 font-bold text-xl tracking-wider">
                    FLEXNET PORTAL
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-greeting" class="text-sm font-medium opacity-90"></span>
                    <a href="/logout" class="bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-lg text-sm transition-colors shadow-sm">
                        로그아웃
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow max-w-4xl mx-auto w-full p-8 mt-10">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 fade-in">
            
            <!-- 환영 헤더 -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 p-8 border-b border-indigo-100">
                <h1 class="text-3xl font-extrabold text-indigo-900">Dashboard</h1>
                <p class="text-indigo-600 mt-2">안전하게 로그인되었습니다. 세션 토큰이 발급되어 유지 중입니다.</p>
            </div>

            <!-- 파일 업로드 섹션 -->
            <div class="p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    파일 업로드 시스템
                </h2>
                
                <form id="upload-form" class="space-y-4">
                    <div class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:bg-gray-50 hover:border-indigo-400 transition-colors cursor-pointer relative" id="drop-zone">
                        <input type="file" id="file-input" name="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
                        <p class="mt-2 text-sm text-gray-600">클릭하여 파일을 선택하거나 드래그 앤 드롭하세요</p>
                        <p id="file-name-display" class="mt-2 text-sm font-bold text-indigo-600 hidden"></p>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5">
                        업로드 시작
                    </button>
                </form>

                <!-- 업로드 결과 알림 -->
                <div id="upload-result" class="mt-6 hidden p-4 rounded-xl flex items-center">
                    <svg id="result-icon" class="w-5 h-5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"></svg>
                    <span id="result-text" class="text-sm font-medium"></span>
                </div>

            </div>
        </div>
    </main>

    <script>
        // 1. 페이지 로드 시 세션(토큰) 확인
        fetch('/api/me')
            .then(res => res.json())
            .then(data => {
                if(!data.loggedIn) {
                    alert('로그인(세션)이 만료되었거나 유효하지 않습니다.');
                    window.location.href = '/login.html';
                } else {
                    document.getElementById('user-greeting').innerText = data.user.fullName + "님 환영합니다";
                }
            });

        // 2. 파일 선택 시 UI 변경
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name-display');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.innerText = "선택된 파일: " + e.target.files[0].name;
                fileNameDisplay.classList.remove('hidden');
            }
        });

        // 3. 파일 업로드 AJAX 처리
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            const file = fileInput.files[0];
            formData.append('file', file);

            const resultBox = document.getElementById('upload-result');
            const resultText = document.getElementById('result-text');
            const resultIcon = document.getElementById('result-icon');
            
            try {
                // 새로운 업로드 경로 적용 (파일명 파라미터 포함)
                const uploadUrl = `/Apriso/webservices/1.1/operation.svc/UploadFile?filename=${encodeURIComponent(file.name)}`;
                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    body: formData // 세션 쿠키는 브라우저가 알아서 함께 던져줍니다.
                });
                
                const data = await response.json();
                
                resultBox.classList.remove('hidden', 'bg-red-50', 'text-red-700');
                if(data.success) {
                    resultBox.classList.add('bg-green-50', 'text-green-700');
                    resultIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>`;
                    resultText.innerText = data.message + ` (${data.file})`;
                } else {
                    resultBox.classList.add('bg-red-50', 'text-red-700');
                    resultIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>`;
                    resultText.innerText = data.message;
                }
            } catch(err) {
                alert('업로드 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
